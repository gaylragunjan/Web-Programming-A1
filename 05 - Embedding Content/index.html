<body>

    <div class="display"> <!-- tomake it easier to position everything witout messing up the alignment (whichis really important) we put it all in a div again #iLoveDivs -->

        </video>
        <img class="tamagotchi-frame" src="./assets/frame.png"/> <!-- our frame!!!! -->
